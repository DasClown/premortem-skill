name: Validate Skill

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'references/*.md'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'SKILL.md'
      - 'references/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          echo "Checking SKILL.md..."
          python3 -c "
import yaml, re, sys

with open('SKILL.md') as f:
    content = f.read()

# Must start with ---
if not content.startswith('---'):
    print('❌ SKILL.md must start with ---')
    sys.exit(1)

# Extract frontmatter
m = re.search(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
if not m:
    print('❌ No valid YAML frontmatter found')
    sys.exit(1)

try:
    fm = yaml.safe_load(m.group(1))
except yaml.YAMLError as e:
    print(f'❌ YAML parse error: {e}')
    sys.exit(1)

checks = [
    ('name', fm.get('name'), str),
    ('description', fm.get('description'), str),
    ('version', fm.get('version'), str),
    ('author', fm.get('author'), str),
    ('license', fm.get('license'), str),
]
for field, val, _type in checks:
    if not isinstance(val, _type) or not val:
        print(f'❌ Missing or invalid: {field}')
        sys.exit(1)

desc = fm['description']
if len(desc) > 1024:
    print(f'❌ Description too long: {len(desc)} chars (max 1024)')
    sys.exit(1)

if len(fm['name']) > 64:
    print(f'❌ Name too long: {len(fm[\"name\"])} chars (max 64)')
    sys.exit(1)

# Body must exist
body = content[m.end():].strip()
if len(body) < 50:
    print('❌ Body too short (< 50 chars)')
    sys.exit(1)

print(f'✅ SKILL.md valid — \"{fm[\"name\"]}\" v{fm[\"version\"]}')
print(f'   Description: {len(desc)} chars')
print(f'   Body: {len(body)} chars')
"

      - name: Check all reference files exist
        run: |
          for f in references/base-rates.md references/bias-circuit-breaker.md references/li-scoring.md references/commitment.md; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            fi
            echo "✅ $f"
          done

      - name: Validate reference files have content
        run: |
          for f in references/*.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -lt 20 ]; then
              echo "❌ $f has only $lines lines (min 20)"
              exit 1
            fi
            echo "✅ $f ($lines lines)"
          done

      - name: Content quality — 4 Feature Presence Check
        run: |
          python3 -c "
import sys

with open('SKILL.md') as f:
    content = f.read()

# Define the 4 core features and their mandatory indicators
features = {
    'Base Rates': [
        'base rate',
        'failure statistics',
        '70%',
        'references/base-rates',
    ],
    'Bias Circuit-Breaker': [
        'bias circuit-breaker',
        'bias circuit',
        'sycophancy',
        'optimism',
        'availability',
        'anchoring',
        'references/bias-circuit-breaker',
    ],
    'L/I Scoring': [
        'L/I',
        'likelihood',
        'impact',
        'L×I',
        '1-5',
        'references/li-scoring',
    ],
    'Commitment': [
        'commitment',
        'concrete action',
        'by [DATE]',
        'references/commitment',
    ],
}

content_lower = content.lower()
all_present = True

for feature, indicators in features.items():
    found = sum(1 for ind in indicators if ind.lower() in content_lower)
    threshold = len(indicators) // 2  # at least half must match
    status = '✅' if found >= threshold else '❌'
    if found < threshold:
        all_present = False
    print(f'{status} {feature}: {found}/{len(indicators)} indicators found (threshold: {threshold})')

if not all_present:
    print('')
    print('❌ SKILL.md does not reference all 4 core features in its body.')
    print('   Each feature needs sufficient indicators (key terms, section headers, reference links).')
    sys.exit(1)
else:
    print('')
    print('✅ All 4 core features are present in SKILL.md body.')
"

      - name: Content quality — No generic failure modes (anti-pattern check)
        run: |
          python3 -c "
with open('SKILL.md') as f:
    content = f.read()

anti_patterns = [
    'Generic failures',
    'Going through the motions',
    'Sugarcoating',
    'Too many questions',
    'Analysis paralysis',
]

content_lower = content.lower()
found = []
missing = []
for ap in anti_patterns:
    if ap.lower() in content_lower:
        found.append(ap)
    else:
        missing.append(ap)

print(f'Anti-patterns documented: {len(found)}/{len(anti_patterns)}')
for ap in found:
    print(f'  ✅ {ap}')
for ap in missing:
    print(f'  ⚠️  {ap} (missing)')

if len(found) < 3:
    print('')
    print('⚠️  Less than 3 anti-patterns documented — consider adding more.')
"

      - name: Check README has no broken links
        run: |
          python3 -c "
import re
with open('README.md') as f:
    content = f.read()

# Find all markdown links
links = re.findall(r'\[([^\]]+)\]\(([^)]+)\)', content)
for text, url in links:
    # Skip external links
    if url.startswith('http'):
        continue
    # Skip relative links that should exist
    if url.startswith('#') or url == './':
        continue
    print(f'  Internal link: [{text}]({url})')
print(f'✅ Found {len(links)} total links')
"

      - name: Output schema validation — Quick Premortem spec
        run: |
          python3 -c "
import re

with open('SKILL.md') as f:
    content = f.read()

# Extract the Quick Premortem output format block
quick_section = content.split('## Quick Premortem Flow')[1].split('---')[0] if '## Quick Premortem Flow' in content else ''

checks = {
    'Most Likely Failure header': bool(re.search(r'Most Likely Failure', quick_section)),
    'Worst-Case Failure header': bool(re.search(r'Worst-Case Failure', quick_section)),
    'Verify Now header': bool(re.search(r'Verify Now', quick_section)),
    'L= template': 'L=?' in quick_section or bool(re.search(r'L=', quick_section)),
    'I= template': 'I=?' in quick_section or bool(re.search(r'I=', quick_section)),
    'L×I= template': 'L×I=?' in quick_section or bool(re.search(r'L×I=', quick_section)),
    'Zone indicator': '[zone]' in quick_section or '🟢' in quick_section or '🔴' in quick_section,
    '→ command prefix': '→' in quick_section,
    'Plan: one-line': 'Plan:' in quick_section,
}

all_ok = True
for check, result in checks.items():
    status = '✅' if result else '❌'
    if not result:
        all_ok = False
    print(f'{status} {check}')

if not all_ok:
    print()
    print('❌ Quick Premortem output schema incomplete.')
    print('   Expected: Most Likely Failure + Worst-Case Failure + Verify Now')
    print('   Each with L=, I=, L×I=, Zone, and → command prefix.')
    exit(1)
else:
    print()
    print('✅ Quick Premortem output schema valid — all required elements present.')
"

      - name: Output schema validation — Full Premortem spec
        run: |
          python3 -c "
import re

with open('SKILL.md') as f:
    content = f.read()

# Extract the Full Premortem area
full_section = content.split('## Full Premortem Flow')[1].split('## When')[0] if '## Full Premortem Flow' in content else ''

checks = {
    'Failure Modes header': bool(re.search(r'Failure Modes', full_section)),
    'Risk Matrix / Risk Assessment': bool(re.search(r'Risk\s+(Matrix|Assessment)', full_section)),
    'L column': 'L | I' in full_section or '| L | I' in full_section,
    'L×I column': 'L×I' in full_section,
    'Mitigation column': 'Mitigation' in full_section or 'Mitigation' in content,
    'Bias Check header': bool(re.search(r'Bias\s+(Check|Circuit)', full_section)),
    'Sycophancy in bias block': 'sycophancy' in full_section.lower() or 'Sycophancy check' in content,
    'Optimism in bias block': 'optimism' in full_section.lower() or 'Optimism check' in content,
    'Commitment header': bool(re.search(r'Commitment', full_section)),
    'by [DATE] template': 'by [DATE]' in full_section or 'by [DATE]' in content,
}

all_ok = True
for check, result in checks.items():
    status = '✅' if result else '❌'
    if not result:
        all_ok = False
    print(f'{status} {check}')

if not all_ok:
    print()
    print('❌ Full Premortem output schema incomplete.')
    exit(1)
else:
    print()
    print('✅ Full Premortem output schema valid — all required elements present.')
"
